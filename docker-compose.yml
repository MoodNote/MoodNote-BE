services:
    db:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: your_password # must match DATABASE_URL in app.environment below
            POSTGRES_DB: moodnote_db
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d moodnote_db"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            - "6379:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    app:
        build: .
        restart: unless-stopped
        ports:
            - "3000:3000"
        env_file:
            - .env
        environment:
            # Overrides DATABASE_URL from .env — use "db" service name, not localhost
            DATABASE_URL: "postgresql://postgres:your_password@db:5432/moodnote_db"
            # Overrides REDIS_URL from .env — use "redis" service name, not localhost
            REDIS_URL: "redis://redis:6379"
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_healthy
        # Optional: mount Firebase service account key for FCM push notifications
        # Place serviceAccountKey.json next to docker-compose.yml, then uncomment:
        # volumes:
        #   - ./serviceAccountKey.json:/app/dist/config/serviceAccountKey.json:ro

volumes:
    postgres_data:
